<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strive-Ops | Operations Command</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

    <style>
        body { background: #020617; color: white; font-family: sans-serif; overflow: hidden; height: 100vh; }
        .ops-glass { background: rgba(15, 23, 42, 0.9); border-right: 1px solid #1e293b; }
        
        /* THE DYNAMIC GRID: Forced Side-by-Side */
        #video-grid { 
            display: grid; 
            gap: 1rem; 
            padding: 1rem; 
            width: 100%; 
            height: 100%; 
            grid-template-columns: 1fr; 
        }
        /* Snap to 50/50 when "active" class is present */
        #video-grid.active { 
            grid-template-columns: 1fr 1fr !important; 
        }
        
        .video-container { background: #000; border-radius: 1rem; overflow: hidden; border: 1px solid #334155; position: relative; width: 100%; height: 100%; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { transform: scaleX(-1); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-4 bg-gray-900 border-b border-gray-800 flex justify-between items-center">
        <h1 class="font-black italic text-xl">STRIVE-OPS</h1>
        <div class="flex gap-4 items-center">
            <p id="my-id" class="text-[10px] font-mono text-blue-400">CONNECTING...</p>
            <input type="text" id="remote-id" placeholder="PASTE ID" class="bg-black border border-gray-700 px-3 py-1 text-xs rounded outline-none w-32">
            <button onclick="startCall()" class="bg-blue-600 px-4 py-1 rounded text-[10px] font-bold">CONNECT</button>
        </div>
    </header>

    <main class="flex flex-grow overflow-hidden">
        <aside class="w-64 ops-glass p-5 flex flex-col space-y-6">
            <div>
                <h3 class="text-[9px] font-bold text-blue-500 uppercase tracking-widest mb-3">Online Team</h3>
                <div id="member-list" class="space-y-2 text-[10px]"></div>
            </div>
            <div class="flex-grow flex flex-col overflow-hidden">
                <h3 class="text-[9px] font-bold text-blue-500 uppercase tracking-widest mb-3">Live Chat</h3>
                <div id="chat-box" class="flex-grow overflow-y-auto space-y-2 text-[10px] mb-4"></div>
                <input type="text" id="chat-input" placeholder="Message..." class="bg-black border border-gray-800 rounded p-2 text-[10px] outline-none focus:border-blue-500">
            </div>
        </aside>

        <section class="flex-grow relative bg-black">
            <div id="video-grid">
                <div class="video-container" id="container-local">
                    <video id="local-video" autoplay muted playsinline></video>
                </div>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
