<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strive Video Center | SVC Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --svc-blue: #3b82f6; --glass: rgba(15, 23, 42, 0.85); }
        body { background: radial-gradient(circle at top right, #0f172a, #020617); color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .svc-glass { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; }
        video { width: 100%; border-radius: 1rem; background: #000; transform: scaleX(-1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #remote-video { transform: none; }
        .btn-action { @apply bg-gray-800 hover:bg-gray-700 px-3 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest transition-all; }
        .btn-active { border: 2px solid var(--svc-blue); background: #1e3a8a !important; }
        .pulse-online { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body class="p-6 lg:p-12">

    <div id="lobby-overlay" class="fixed inset-0 bg-black bg-opacity-95 z-50 flex flex-col items-center justify-center hidden">
        <div class="svc-glass p-12 text-center border-2 border-blue-600">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-6"></div>
            <h2 class="text-xl font-black mb-2 uppercase tracking-tighter">Connecting to Host</h2>
            <p class="text-gray-500 text-xs">Awaiting admission to Strive VC...</p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto space-y-8">
        <header class="flex flex-col lg:flex-row justify-between items-center gap-6 svc-glass p-8">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter text-blue-500">STRIVE VC</h1>
                <p class="text-[10px] text-gray-500 font-mono mt-2">NETWORK STATUS: <span id="my-id" class="text-blue-400 font-bold uppercase">Connecting...</span></p>
                <button onclick="copyInvite()" class="mt-3 text-[9px] bg-blue-900 bg-opacity-30 text-blue-300 px-4 py-1.5 rounded-full hover:bg-blue-600 transition font-bold uppercase tracking-widest">Generate Invite</button>
            </div>
            <div class="flex gap-3 w-full lg:w-auto">
                <input type="text" id="remote-id" placeholder="Paste Remote ID" class="bg-black bg-opacity-50 border border-gray-800 rounded-2xl px-6 py-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none w-full lg:w-72">
                <button onclick="startCall()" class="bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-2xl font-black transition transform active:scale-95 shadow-xl uppercase text-xs">Connect</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3 space-y-6">
                <div class="svc-glass p-6">
                    <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4">Active Session</h3>
                    <div id="member-list" class="space-y-3">
                        <div class="text-[9px] text-gray-600 italic">Listening for peers...</div>
                    </div>
                </div>
                <div class="svc-glass p-6">
                    <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-widest mb-4">AI Background</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btn-none" onclick="setBgMode('none')" class="btn-action btn-active">Off</button>
                        <button id="btn-blur" onclick="setBgMode('blur')" class="btn-action">Blur</button>
                        <button id="btn-color" onclick="setBgMode('color')" class="btn-action">SVC Blue</button>
                        <button id="btn-image" onclick="document.getElementById('bg-upload').click()" class="btn-action">Custom</button>
                    </div>
                    <input type="file" id="bg-upload" accept="image/*" class="hidden" onchange="loadCustomBackground(event)">
                </div>
            </div>

            <div class="lg:col-span-6 space-y-6">
                <div class="relative group">
                    <video id="local-video" autoplay muted playsinline class="pulse-online"></video>
                    <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex gap-4">
                        <button id="toggle-mic" onclick="toggleMic()" class="bg-gray-900 bg-opacity-90 p-4 rounded-2xl hover:bg-blue-600 transition">🎤</button>
                        <button id="toggle-cam" onclick="toggleCam()" class="bg-gray-900 bg-opacity-90 p-4 rounded-2xl hover:bg-blue-600 transition">📷</button>
                    </div>
                </div>
                <video id="remote-video" autoplay playsinline class="border border-gray-900 shadow-2xl"></video>
            </div>

            <div class="lg:col-span-3">
                <div class="svc-glass flex flex-col h-full overflow-hidden">
                    <div class="p-5 border-b border-gray-800 flex justify-between items-center bg-black bg-opacity-30">
                        <h3 class="font-black text-[10px] text-blue-400 tracking-widest uppercase">Transcription</h3>
                        <span id="ai-status" class="text-[8px] bg-black px-2 py-1 rounded text-gray-500 font-bold uppercase tracking-tighter">Standby</span>
                    </div>
                    <div id="transcript-box" class="flex-grow p-6 overflow-y-auto h-[500px] space-y-4">
                        <p class="text-center text-gray-800 text-[10px] mt-20 uppercase font-black opacity-30">Waiting for Data</p>
                    </div>
                    <div class="p-5">
                        <button id="trans-btn" onclick="startTranscription()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-black text-[10px] tracking-widest transition uppercase shadow-lg">Start AI Sync</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
