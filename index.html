<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strive-Ops | Team Command Center</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --ops-blue: #3b82f6; --ops-bg: #020617; }
        body { background-color: var(--ops-bg); color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .ops-glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        #video-grid { display: grid; gap: 1rem; padding: 1rem; height: 100%; width: 100%; }
        .video-container { position: relative; border-radius: 1rem; overflow: hidden; background: #000; border: 1px solid #1e293b; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { transform: scaleX(-1); }
        
        /* Layout Fixes */
        .sidebar-scroll { height: calc(100vh - 200px); overflow-y: auto; }
        #boot-screen { position: fixed; inset: 0; z-index: 1000; background: #020617; display: flex; flex-direction: column; items: center; justify-content: center; }
        .control-dock { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 1rem; padding: 0.75rem 1.5rem; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="boot-screen">
        <h1 class="text-blue-500 font-black text-2xl mb-4 italic tracking-tighter uppercase">Strive-Ops</h1>
        <button onclick="bootSystem()" class="bg-blue-600 px-12 py-6 rounded-2xl font-black text-xl uppercase shadow-2xl transition transform active:scale-95">Launch Workspace</button>
        <p id="boot-status" class="text-[10px] text-gray-500 uppercase tracking-widest mt-4">System Standby...</p>
    </div>

    <header class="flex justify-between items-center px-8 py-4 ops-glass border-b border-gray-800">
        <div class="flex items-center gap-4">
            <div class="h-10 w-10 bg-blue-600 rounded-lg flex items-center justify-center font-black">SO</div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase">STRIVE<span class="text-blue-500">-OPS</span></h1>
        </div>
        <div class="flex gap-4 items-center">
            <span id="my-id" class="text-[10px] font-mono text-blue-400 font-bold uppercase">Node ID: Offline</span>
            <button onclick="copyInvite()" class="text-[9px] bg-gray-800 px-3 py-1 rounded text-gray-400 hover:text-white uppercase font-black">Invite Link</button>
        </div>
    </header>

    <main class="flex flex-grow overflow-hidden">
        <aside class="w-80 ops-glass border-r border-gray-800 flex flex-col">
            <div class="p-4 border-b border-gray-800">
                <h3 class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-3">Experts Online</h3>
                <div id="member-list" class="space-y-2"></div>
            </div>

            <div class="flex-grow flex flex-col p-4 overflow-hidden">
                <h3 class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-3">Team Chat</h3>
                <div id="chat-box" class="flex-grow overflow-y-auto space-y-3 mb-4 text-[11px] pr-2">
                    <p class="text-gray-600 italic">Welcome to the Strive-Ops secure channel.</p>
                </div>
                <div class="mt-auto">
                    <input type="text" id="chat-input" placeholder="Message experts..." 
                        class="w-full bg-black bg-opacity-40 border border-gray-800 rounded-lg px-4 py-3 text-xs outline-none focus:border-blue-500">
                </div>
            </div>
        </aside>

        <section class="flex-grow bg-black bg-opacity-20 relative">
            <div id="video-grid" class="grid-cols-1 md:grid-cols-2">
                <div class="video-container host" id="container-local">
                    <video id="local-video" autoplay muted playsinline></video>
                    <div class="absolute top-4 left-4 bg-blue-600 px-2 py-0.5 rounded text-[8px] font-black uppercase">Host: Luis</div>
                </div>
            </div>
        </section>
    </main>

    <nav class="control-dock ops-glass shadow-2xl">
        <button onclick="toggleMic()" class="bg-gray-800 p-3 rounded-full hover:bg-blue-600 transition">🎤</button>
        <button onclick="toggleCam()" class="bg-gray-800 p-3 rounded-full hover:bg-blue-600 transition">📷</button>
        <div class="w-px h-6 bg-gray-700 mx-2"></div>
        <button onclick="setBgMode('blur')" class="bg-gray-800 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Blur</button>
        <button onclick="setBgMode('none')" class="bg-gray-800 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Off</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
