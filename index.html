<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strive-Ops Coaching</title>

  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <style>
    :root {
      --bg: #020617;
      --card: #0f172a;
      --line: #1e293b;
      --text: #f8fafc;
      --muted: #94a3b8;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --dark: #334155;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .grow {
      flex: 1 1 240px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #020617;
      color: var(--text);
    }

    button {
      padding: 12px 16px;
      border: 0;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    .btn-blue { background: var(--blue); }
    .btn-green { background: var(--green); }
    .btn-red { background: var(--red); }
    .btn-dark { background: var(--dark); }

    .id-box {
      font-weight: 700;
      color: #60a5fa;
      word-break: break-all;
    }

    .videos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .video-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
    }

    .video-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    video {
      width: 100%;
      background: black;
      border-radius: 12px;
      min-height: 240px;
      object-fit: cover;
    }

    #local-video {
      transform: scaleX(-1);
    }

    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      border-radius: 12px;
      background: #000;
      color: var(--muted);
      text-align: center;
      padding: 20px;
    }

    #status {
      color: var(--muted);
      font-size: 14px;
    }

    #tap-play-remote {
      display: none;
      margin-top: 10px;
      width: 100%;
    }

    @media (max-width: 800px) {
      .videos {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Strive-Ops Coaching</h1>
    <div class="sub">Desktop can broadcast. Mobile can join as viewer.</div>

    <div class="panel">
      <div style="margin-bottom:8px;">Your ID</div>
      <div id="my-id" class="id-box">Connecting...</div>
    </div>

    <div class="panel">
      <div class="row">
        <div class="grow">
          <input id="remote-id" placeholder="Enter remote ID" />
        </div>
        <button id="enable-media-btn" class="btn-green">Enable Camera & Mic</button>
        <button id="viewer-btn" class="btn-dark">Join as Viewer</button>
        <button id="connect-btn" class="btn-blue">Connect</button>
        <button id="hangup-btn" class="btn-red">Hang Up</button>
      </div>
      <div style="margin-top: 12px;">
        <button id="copy-link-btn" class="btn-dark">Copy Invite Link</button>
      </div>
    </div>

    <div class="panel">
      <div id="status">Ready.</div>
    </div>

    <div class="videos">
      <div class="video-card">
        <div class="video-title">My Preview</div>
        <video id="local-video" autoplay muted playsinline style="display:none;"></video>
        <div id="local-placeholder" class="placeholder">
          Camera is off on this device.
        </div>
      </div>

      <div class="video-card">
        <div class="video-title">Remote Preview</div>
        <video id="remote-video" autoplay playsinline style="display:none;"></video>
        <div id="remote-placeholder" class="placeholder">
          Waiting for remote stream.
        </div>
        <button id="tap-play-remote" class="btn-blue">Tap to Start Remote Video</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
