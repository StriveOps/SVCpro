<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strive-Ops | Operations Command Center</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>

    <style>
        :root { --ops-blue: #3b82f6; --ops-bg: #020617; }
        body { background-color: var(--ops-bg); color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .ops-glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        #video-grid { display: grid; gap: 1rem; padding: 1rem; height: 100%; width: 100%; }
        .video-container { position: relative; border-radius: 1rem; overflow: hidden; background: #000; border: 1px solid #1e293b; }
        .video-container.host { border: 2px solid var(--ops-blue); box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { transform: scaleX(-1); }
        .control-dock { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 1rem; padding: 0.75rem 1.5rem; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="flex justify-between items-center px-8 py-4 ops-glass border-b border-gray-800">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black italic tracking-tighter uppercase">STRIVE<span class="text-blue-500">-OPS</span></h1>
            <p id="my-id" class="text-[10px] font-mono text-gray-500 font-bold uppercase tracking-widest">INITIALIZING...</p>
        </div>
        <div class="flex gap-4">
            <input type="text" id="remote-id" placeholder="EXPERT ID" class="bg-black bg-opacity-40 border border-gray-800 rounded px-3 py-1 text-xs outline-none w-32">
            <button onclick="startCall()" class="bg-blue-600 text-[10px] font-black uppercase px-4 py-2 rounded">Connect</button>
            <button onclick="copyInvite()" class="text-[9px] font-black uppercase text-gray-500 hover:text-white transition">Copy Link</button>
        </div>
    </header>

    <main class="flex flex-grow overflow-hidden">
        <aside class="w-72 ops-glass border-r border-gray-800 flex flex-col p-5 space-y-6">
            <div>
                <h3 class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-3">Hardware</h3>
                <select id="video-source" class="w-full bg-gray-900 border border-gray-800 rounded p-2 text-[10px] text-gray-400 mb-2" onchange="getMedia()"></select>
                <select id="audio-source" class="w-full bg-gray-900 border border-gray-800 rounded p-2 text-[10px] text-gray-400" onchange="getMedia()"></select>
            </div>
            <div>
                <h3 class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-3">Team Chat</h3>
                <div id="chat-box" class="h-64 overflow-y-auto space-y-3 text-[10px] mb-3"></div>
                <input type="text" id="chat-input" placeholder="Broadcast..." class="bg-black bg-opacity-40 border border-gray-800 rounded p-2 text-[10px] w-full outline-none">
            </div>
        </aside>

        <section class="flex-grow bg-black bg-opacity-20 relative">
            <div id="video-grid" class="grid-cols-1">
                <div class="video-container host" id="container-local">
                    <video id="local-video" autoplay muted playsinline></video>
                </div>
            </div>
        </section>
    </main>

    <nav class="control-dock ops-glass shadow-2xl">
        <button onclick="toggleMic()" class="bg-gray-800 p-3 rounded-full">🎤</button>
        <button onclick="toggleCam()" class="bg-gray-800 p-3 rounded-full">📷</button>
        <button onclick="setBgMode('blur')" class="bg-gray-800 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Blur</button>
        <button onclick="toggleScreenShare()" class="bg-purple-600 px-6 py-3 rounded-xl font-black text-[9px] uppercase">Share</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
