<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strive-Ops Live</title>
  <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0f1c;
      color: #f1f5f9;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 14px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
    }

    .brand {
      font-size: 22px;
      font-weight: bold;
    }

    .id-line {
      font-size: 14px;
      color: #93c5fd;
      word-break: break-all;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      padding: 14px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
    }

    input {
      flex: 1 1 220px;
      min-width: 200px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #020617;
      color: white;
    }

    button {
      padding: 12px 16px;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      font-weight: 700;
    }

    .primary { background: #2563eb; }
    .success { background: #16a34a; }
    .danger { background: #dc2626; }
    .dark { background: #334155; }

    .status {
      margin-bottom: 16px;
      padding: 12px 14px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 14px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: black;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #1f2937;
    }

    #remote-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: black;
      display: none;
    }

    .remote-empty {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      text-align: center;
      padding: 20px;
    }

    .self-box {
      position: absolute;
      right: 16px;
      bottom: 16px;
      width: 26%;
      max-width: 260px;
      min-width: 130px;
      aspect-ratio: 16 / 10;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    #local-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      display: none;
      background: black;
    }

    .local-empty {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      text-align: center;
      padding: 10px;
      font-size: 12px;
    }

    #tap-to-play {
      display: none;
      margin-top: 12px;
      width: 100%;
    }

    @media (max-width: 700px) {
      .self-box {
        width: 34%;
        right: 10px;
        bottom: 10px;
      }

      .brand {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="brand">Strive-Ops Live</div>
        <div class="id-line">My ID: <span id="my-id">Connecting...</span></div>
      </div>
      <button id="copy-id-btn" class="dark">Copy My ID</button>
    </div>

    <div class="controls">
      <button id="start-camera-btn" class="success">Start Camera</button>
      <input id="peer-id-input" placeholder="Paste coach or host ID here" />
      <button id="join-call-btn" class="primary">Join Session</button>
      <button id="end-call-btn" class="danger">End Call</button>
    </div>

    <div id="status" class="status">Ready. Start your camera on the broadcasting device, then join from the other device.</div>

    <div class="stage">
      <video id="remote-video" autoplay playsinline></video>
      <div id="remote-empty" class="remote-empty">Remote live video will appear here.</div>

      <div class="self-box">
        <video id="local-video" autoplay muted playsinline></video>
        <div id="local-empty" class="local-empty">Your camera preview</div>
      </div>
    </div>

    <button id="tap-to-play" class="primary">Tap to Start Remote Video</button>
  </div>

  <script src="app.js?v=1"></script>
</body>
</html>
