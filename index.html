<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strive-Ops | Operations Command Center</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>

    <style>
        :root { --ops-blue: #3b82f6; --ops-bg: #020617; }
        body { background-color: var(--ops-bg); color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .ops-glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* THE GALLERY GRID */
        #video-grid { display: grid; gap: 1rem; padding: 1rem; height: 100%; width: 100%; grid-template-columns: 1fr; }
        #video-grid.side-by-side { grid-template-columns: 1fr 1fr !important; }
        
        .video-container { position: relative; border-radius: 1rem; overflow: hidden; background: #000; border: 1px solid #1e293b; height: 100%; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #local-video { transform: scaleX(-1); }
        
        .control-dock { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; gap: 1rem; padding: 0.75rem 1.5rem; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); }
        .rec-dot { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <div id="lobby-gate" class="fixed inset-0 z-[200] bg-black bg-opacity-80 backdrop-blur-md hidden items-center justify-center">
        <div class="ops-glass p-8 rounded-3xl border border-blue-500 shadow-2xl text-center max-w-sm">
            <h2 class="text-xl font-black uppercase italic mb-2">Expert Knocking</h2>
            <p id="knocker-id" class="text-[10px] text-gray-500 mb-6 uppercase tracking-widest font-bold">Node: ---</p>
            <div class="flex gap-4">
                <button onclick="acceptExpert()" class="flex-1 bg-blue-600 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-blue-500 transition">Admit</button>
                <button onclick="declineExpert()" class="flex-1 bg-gray-800 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-red-600 transition">Decline</button>
            </div>
        </div>
    </div>

    <header class="flex justify-between items-center px-8 py-4 ops-glass border-b border-gray-800">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-black italic tracking-tighter uppercase leading-none">STRIVE<span class="text-blue-500">-OPS</span></h1>
            <div class="flex items-center gap-2 mt-1">
                <div class="rec-dot"></div>
                <p id="my-id" class="text-[9px] font-mono text-gray-500 font-bold uppercase">INITIALIZING...</p>
            </div>
        </div>
        <div class="flex gap-4">
            <input type="text" id="remote-id" placeholder="EXPERT ID" class="bg-black bg-opacity-40 border border-gray-800 rounded px-3 py-1 text-xs outline-none w-32 py-2">
            <button onclick="startCall()" class="bg-blue-600 text-[10px] font-black uppercase px-4 py-2 rounded">Connect</button>
        </div>
    </header>

    <main class="flex flex-grow overflow-hidden">
        <aside class="w-72 ops-glass border-r border-gray-800 flex flex-col p-5 space-y-6">
            <div class="p-4 bg-black bg-opacity-30 rounded-xl border border-gray-800">
                <h3 class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-3">Hardware</h3>
                <select id="video-source" class="w-full bg-gray-900 border border-gray-800 rounded p-2 text-[10px] text-gray-400 mb-2" onchange="getMedia()"></select>
                <select id="audio-source" class="w-full bg-gray-900 border border-gray-800 rounded p-2 text-[10px] text-gray-400" onchange="getMedia()"></select>
            </div>
            <div>
                <h3 class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-3">Experts Online</h3>
                <div id="member-list" class="space-y-2"></div>
            </div>
            <div class="flex-grow flex flex-col overflow-hidden">
                <h3 class="text-[9px] font-black text-blue-500 uppercase tracking-widest mb-3">Team Chat</h3>
                <div id="chat-box" class="flex-grow overflow-y-auto space-y-2 text-[10px] mb-4 pr-2"></div>
                <input type="text" id="chat-input" placeholder="Broadcast..." class="bg-black bg-opacity-40 border border-gray-800 rounded p-3 text-[10px] w-full outline-none focus:border-blue-500">
            </div>
        </aside>

        <section class="flex-grow bg-black bg-opacity-20 relative">
            <div id="video-grid">
                <div class="video-container host" id="container-local">
                    <video id="local-video" autoplay muted playsinline></video>
                </div>
            </div>
        </section>
    </main>

    <nav class="control-dock ops-glass shadow-2xl">
        <button onclick="toggleMic()" class="bg-gray-800 p-3 rounded-full hover:bg-blue-600 transition">🎤</button>
        <button onclick="toggleCam()" class="bg-gray-800 p-3 rounded-full hover:bg-blue-600 transition">📷</button>
        <div class="w-px h-6 bg-gray-700 mx-2"></div>
        <button onclick="setBgMode('blur')" class="bg-gray-800 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Blur</button>
        <button onclick="setBgMode('none')" class="bg-gray-800 px-4 py-2 rounded-xl text-[9px] font-black uppercase">Off</button>
        <div class="w-px h-6 bg-gray-700 mx-2"></div>
        <button onclick="toggleScreenShare()" class="bg-purple-600 px-6 py-3 rounded-xl font-black text-[9px] uppercase">Share Screen</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
